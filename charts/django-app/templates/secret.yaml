{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name | quote }}
  labels:
    app.kubernetes.io/name: django-app
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ required "secret.djangoSecretKey is required when secret.create=true" .Values.secret.djangoSecretKey | quote }}
  POSTGRES_PASSWORD: {{ required "secret.postgresPassword is required when secret.create=true" .Values.secret.postgresPassword | quote }}
{{- end }}
